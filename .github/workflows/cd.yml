name: CD

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_ROLE_ARN: ${{ vars.ROLE_ARN }}
  ECR_REPOSITORY: mcp-server-prod
  AWS_REGION: us-east-1

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r api/requirements.txt
          pip install -r mcp-server/requirements.txt

      - name: Run unit tests
        run: python -m unittest discover -s api/tests -p "test_*.py" -v

  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    needs: test
    outputs:
      code_changed: ${{ steps.filter.outputs.code_changed }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code_changed:
              - 'mcp-server/**'
              - 'api/**'
              - 'website/**'
              - 'infra/**'
              - '.github/workflows/*.yml'

  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.code_changed == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG mcp-server/
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

  deploy:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: [test, detect-changes, build-and-push]
    if: ${{ !cancelled() && needs.test.result == 'success' && needs.detect-changes.result == 'success' && (needs.build-and-push.result == 'success' || needs.build-and-push.result == 'skipped') }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify OIDC Auth
        run: aws sts get-caller-identity

      - name: Resolve image tag
        id: image-tag
        run: |
          if [[ "${{ needs.build-and-push.result }}" == "success" ]]; then
            echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            CURRENT_IMAGE=$(aws ecs describe-task-definition \
              --task-definition "$(aws ecs describe-services \
                --cluster mcp-cluster-prod \
                --services mcp-server-service-prod \
                --query 'services[0].taskDefinition' --output text 2>/dev/null)" \
              --query 'taskDefinition.containerDefinitions[0].image' --output text 2>/dev/null) || CURRENT_IMAGE=""
            echo "tag=${CURRENT_IMAGE##*:}" >> "$GITHUB_OUTPUT"
          fi

      - name: Terraform Init
        working-directory: infra/prod
        run: terraform init

      - name: Terraform Plan
        working-directory: infra/prod
        run: terraform plan -var="mcp_image_tag=${{ steps.image-tag.outputs.tag }}" -var="github_token=${{ secrets.GH_PAT }}" -no-color -input=false

      - name: Terraform Apply
        working-directory: infra/prod
        if: github.ref == 'refs/heads/main'
        run: terraform apply -var="mcp_image_tag=${{ steps.image-tag.outputs.tag }}" -var="github_token=${{ secrets.GH_PAT }}" -auto-approve -input=false
