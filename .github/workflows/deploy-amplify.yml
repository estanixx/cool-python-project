name: Manual Conditional Amplify Deploy

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - "amplify.yml"

permissions:
  id-token: write
  contents: read

env:
  AWS_ROLE_ARN: ${{ vars.ROLE_ARN }}
  AWS_REGION: us-east-1

jobs:
  deploy:
    name: Deploy Website via Amplify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Signal Amplify to Build
        run: |
          APP_ID=$(aws amplify list-apps \
            --query "apps[?name=='cool-python-project-website'].appId" \
            --output text)
          echo "Triggering Amplify build for app: $APP_ID"
          aws amplify start-job \
            --app-id "$APP_ID" \
            --branch-name main \
            --job-type RELEASE
