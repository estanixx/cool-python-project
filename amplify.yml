version: 1
applications:
  - appRoot: website
    # appRoot must remain website for @/* aliases to resolve via tsconfig.
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*


