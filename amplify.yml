version: 1
applications:
  - appRoot: website
    # appRoot must remain website for @/* aliases to resolve via tsconfig.
    # appRoot override guardrail: keep Amplify console appRoot aligned.
    frontend:
      phases:
        preBuild:
          commands:
            # Install devDependencies so TypeScript/@types/node are available in Amplify.
            - npm ci --include=dev
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*

