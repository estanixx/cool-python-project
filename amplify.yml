version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    # Since Amplify is already in the 'website' folder, just look for .next
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*