services:
  floci:
    image: floci/floci:latest
    ports:
      - "4566:4566"
    environment:
      LOCALSTACK_HOST: floci
      PERSISTENCE: "1"
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      # Mount Docker socket so Floci can spawn Lambda containers
      - /var/run/docker.sock:/var/run/docker.sock

  mcp-server:
    build: ./mcp-server
    ports:
      - "8000:8000"
    environment:
      - API_BASE_URL=http://floci:4566
      - API_ID=${API_ID:-}
    depends_on:
      - floci
    restart: unless-stopped
